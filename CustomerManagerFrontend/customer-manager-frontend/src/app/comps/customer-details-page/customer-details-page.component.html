<div class="customerDetailsPage">
    <h2>Edit Customer</h2>

    <form [formGroup]="customerForm" (ngSubmit)="saveCustomer()">

    <div class="form-row">
        <label>First Name</label>
        <input type="text" formControlName="firstName" />
        <div class="error" *ngIf="customerForm.controls['firstName'].touched && customerForm.controls['firstName'].invalid">
        First name must be at least 2 characters
        </div>
    </div>

    <div class="form-row">
        <label>Last Name</label>
        <input type="text" formControlName="lastName" />
        <div class="error" *ngIf="customerForm.controls['lastName'].touched && customerForm.controls['lastName'].invalid">
        Last name must be at least 2 characters
        </div>
    </div>

    <div class="form-row">
        <label>Email</label>
        <input type="email" formControlName="email" />
        <div class="error" *ngIf="customerForm.controls['email'].invalid">
        Enter a valid email address
        </div>
    </div>

    <div class="form-row">
        <label>Phone</label>
        <input type="text" formControlName="phone" />
    </div>

    <div class="form-row">
        <label>City</label>
        <input type="text" formControlName="city" />
    </div>

    <div class="form-row">
        <label>Country</label>
        <input type="text" formControlName="country" />
    </div>

    <div class="button-row">
        <button type="submit" [disabled]="customerForm.invalid">Save</button>
        <button type="button" class="cancel-btn" (click)="cancel()">Cancel</button>
    </div>

    </form>

    <div class="toast success" *ngIf="showSuccessToast">Customer saved successfully</div>
    <div class="toast error" *ngIf="showErrorToast">Failed to save customer</div>
</div>
